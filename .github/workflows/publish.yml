name: Build & Publish RPM Repository

# GPG signing is done LOCALLY before pushing (see scripts/add-package.sh).
# This workflow only regenerates repodata and deploys to GitHub Pages.
# No GPG secrets are needed here.

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "repodata/**"
      - "index.html"
      - ".github/workflows/publish.yml"
  workflow_dispatch:      # manual trigger

# Only one publish job at a time
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write            # to deploy to GitHub Pages
  id-token: write         # required for Pages OIDC deployment

jobs:
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "."     # publish the entire repo root as the site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
